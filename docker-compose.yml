services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - .mongodb:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
      - MONGO_INITDB_DATABASE=${DB_NAME}
    secrets:
      - mongodb_root_password
    networks:
      - mini-rag-network
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --username ${DB_ROOT_USERNAME} --password $$(cat /run/secrets/mongodb_password) --eval 'db.runCommand({ping:1})' --quiet || exit 1" ]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  mini-rag-network:
    driver: bridge

volumes:
  .mongodb:
    driver: local

secrets:
  mongodb_root_password:
    file: ./secrets/mongodb_root_password.txt
